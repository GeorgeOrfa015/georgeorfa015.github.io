<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@300;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap');
        body{
            background: #000;
            color: #fff;
            font-family: "Manrope";
        }
        #outerContainer{
            display: grid;
            grid-template-columns: 1fr;
            position: absolute;
            top: 5vw;
            left: 0;
            z-index: -1;
        }
        #search{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1vw;
            margin-bottom: 1vw;
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100% - 2vw);
            padding: 1vw;
            background: linear-gradient(#000a, #0000)
        }
        #searchBar{
            font-size: 1.75vw;
            width: auto;
            /* background: #333;
            border: 0px;
            padding: 0.75vw;
            border-radius: 1vw;*/
            color: #fff;
            transition: 0.2s background; 
            backdrop-filter: blur(0.15vw);
            background: #4446;
            text-shadow: 0 0 0.3vw #000;
            padding: 1vw 1.25vw;
            border-radius: 5vw;
            border: 0vw #333a solid;
            bottom: 1vw;
            box-shadow: inset 0 0 0.3vw #fff2;
        }
        #searchBar::placeholder{
            color: #fff;
            text-shadow: 0 0 0.3vw #0003;
        }
        #searchBar:hover{
            background: #fff2;
            box-shadow: inset 0 0 0.3vw #fff3;
        }
        #searchBar:focus{
            outline: none;
        }
        #dayButton{
            background: #056c3055;
            color: #fff;
            border: none;
            border-radius: 10vw;
            backdrop-filter: blur(0.15vw);
            box-shadow: inset 0 0 0.3vw #fff4;
            padding: 0.3vw 0.7vw;
            font-size: 1.75vw;
            font-weight: 600;
            font-family: "Manrope";
            transition: 0.1s background, 0.2s border;
            height: 100%;
        }
        .arrival{
            font-family: "Chivo Mono";
        }
        @media(max-width:700px) {
            #search{
                left: 0;
                top: unset;
                bottom: 0;
                background: #0000;
            }
            #searchBar{
                font-size: 4vw;
                padding: 2vw 4vw;
                backdrop-filter: blur(0.3vw);
                margin: 2vw;
                margin-bottom: 1vw;
                box-shadow: inset 0 0 0.3vw #fff2;
            }
            #searchBar:hover{
                background: #fff2;
                box-shadow: inset 0 0 1vw #fff3;
            }
        }
    </style>
</head>
<body>
    <div id="search">
        <button id="dayButton">Select Stop</button>
        <input type="text" oninput="search()" id="searchBar" placeholder="Enter a Bus Stop ID...">
        <button id="dayButton">MONDAY</button>
    </div>
    <div id="outerContainer">

    </div>
    <script>
        const hash = window.location.hash;
        const colorDict = {
            L01: "#c42a19",
            L02: "#7e786f",
            L03: "#8c705d",
            L04: "#570096",
            L05: "#7e0d48",
            L06: "#4b8136",
            L07: "#6483db",
            L09: "#360408",
            L10: "#7e786f",
            L11: "#d82e5c",
            L12: "#5300d9",
            L14: "#7e786f",
            L15: "#487f83",
            L16: "#4c007d",
            L17: "#e89c31",
            L19: "#5300d9",
            L20: "#6fb454",
            L23: "#23211e",
            L21: "#e24172",
            L31: "#4f585c",
            L50: "#000080",
            L91: "#dd6059",
            L92: "#5f6ee5",
            L93: "#65c251"
        }
        if (hash) {
            document.getElementById("searchBar").value = hash.split("#")[1]
        } else {
            document.write("No hash found in URL");
        }
        async function getKey() {
            const url = "https://corsproxy.io/?https://irakleio.citybus.gr/stops/live/0122";
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error: ${response.status}`);
            }
            
            return await response.text()
        }

        async function getData(key) {
            const response = await fetch(
                "https://corsproxy.io/?https://rest.citybus.gr/api/v1/el/110/stops",
                {
                    cache: "no-store",
                    headers: {
                        "Authorization": key,
                        "Cache-Control": "no-cache, no-store, must-revalidate",
                        "Pragma": "no-cache",
                        "Expires": "0"
                    }
                }
            );
            return await response.json();
        }
        async function getMoreData(key, stop, day){
            const response = await fetch(
                `https://corsproxy.io/?https://rest.citybus.gr/api/v1/en/110/trips/stop/${stop}/day/${day}`,
                {
                    cache: "no-store",
                    headers: {
                        "Authorization": key,
                        "Cache-Control": "no-cache, no-store, must-revalidate",
                        "Pragma": "no-cache",
                        "Expires": "0"
                    }
                }
            );
            return await response.json();
        }
        let list;
        let key;
        getKey().then(html => {
            key = "Bearer " + html.split("token = '")[1].split("';")[0]
            console.log(key)
            key = key
            let outerCont = document.getElementById("outerCont")
            getData(key).then(data => {
                list = data
                showSchedule()
            })
        })
        function showSchedule(){
            let value = document.getElementById("searchBar").value
            console.log(value)
            getMoreData(key, value, "6").then(data => {
                console.table(data)
                data.forEach(element => {
                    console.log(element)
                    // DAYS 0-6 | Starts on Sunday (0)
                    // ROUTE API RESPONSE
                    // day: 3
                    // id: 51122767
                    // lineCode: "12"
                    // lineColor: "#787878"
                    // lineName: "HELLENIC MEDITERRANEAN UNIVERSITY ( EL.ME.PA.)"
                    // lineTextColor: "#ffffff"
                    // routeCode: "21018"
                    // routeName: "AIRPORT - HMU | HELLENIC MEDITERRANEAN UNIVERSITY"
                    // stopCode: "0122"
                    // stopName: "62 MARTYRON 200 - JUMBO"
                    // tripTime: "12:57"
                    // tripTimeHour: 12
                    // tripTimeMinute: 57
                    let cont = document.createElement("div")
                    cont.innerHTML = `${element.tripTime} | ${element.lineCode} | ${element.routeName}`
                    cont.style.color = colorDict["L"+element.lineCode]
                    cont.className = "arrival"
                    document.getElementById("outerContainer").appendChild(cont)
                });
            })
        }
        //https://rest.citybus.gr/api/v1/en/110/trips/stop/2196/day/5
    </script>
</body>
</html>
