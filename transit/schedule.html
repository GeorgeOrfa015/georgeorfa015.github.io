<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@300;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap');
        body{
            background: #000;
            color: #fff;
            font-family: "Manrope";
        }
        /* div>*{
            transform: rotate3d(0, 0, 0, 0);
            transition: transform 10s;
            perspective: 600px;
        }
        div>*:hover{
            transform: rotate3d(0.5, 0.7, 0.3, 1800deg) scaleZ(2);
        } */
        #outerContainer{
            display: grid;
            gap: 1vw;
            grid-template-columns: 1fr;
            position: absolute;
            top: 5vw;
            left: 0;
            width: calc(100% - 2vw);
            z-index: -1;
            padding: 1vw;
        }
        #search{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1vw;
            margin-bottom: 1vw;
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100% - 2vw);
            padding: 1vw;
            background: linear-gradient(#000a, #0000)
        }
        #searchBar{
            font-size: 1.75vw;
            width: auto;
            /* background: #333;
            border: 0px;
            padding: 0.75vw;
            border-radius: 1vw;*/
            color: #fff;
            transition: 0.2s background; 
            backdrop-filter: blur(0.15vw);
            background: #4446;
            text-shadow: 0 0 0.3vw #000;
            padding: 1vw 1.25vw;
            border-radius: 5vw;
            border: 0vw #333a solid;
            bottom: 1vw;
            box-shadow: inset 0 0 0.3vw #fff2;
        }
        #searchBar::placeholder{
            color: #fff;
            text-shadow: 0 0 0.3vw #0003;
        }
        #searchBar:hover{
            background: #fff2;
            box-shadow: inset 0 0 0.3vw #fff3;
        }
        #searchBar:focus{
            outline: none;
        }
        #dayButton{
            background: #056c3055;
            color: #fff;
            border: none;
            border-radius: 10vw;
            backdrop-filter: blur(0.15vw);
            box-shadow: inset 0 0 0.3vw #fff4;
            padding: 0.3vw 0.7vw;
            font-size: 1.75vw;
            font-weight: 600;
            font-family: "Manrope";
            transition: 0.1s background, 0.2s border;
            height: 100%;
        }
        .arrival{
            font-family: "Manrope";
            font-size: 1.2vw;
            display: grid;
            grid-template-columns: 3.5vw 0.15vw auto;
            gap: 0.5vw;
        }
        .hourOuterCont{
            padding: 0vw;
            background: #222;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
            border-radius: 1vw;
            overflow: hidden;
        }
        .lineCont{
            display: grid;
            grid-template-columns: auto 1fr;
            background: #292929;
            border-radius: 0.75vw;
            padding: 0.5vw;
            gap: 0.625vw;
        }
        .hourContTextBox{
            display: grid;
            width: fit-content;
            grid-template-columns: auto 1fr;
            gap: 1vw;
            background: #555;
            width: 100%;
            padding: 0.8vw 1vw;
        }
        .hourText{
            font-weight: 800;
            font-size: 2.2vw;
            font-family: "Manrope";
            width: fit-content;
        }
        .counterText{
            align-self:center;
            color: #ddd;
            font-size: 1.5vw;
            text-align: left;
        }
        .lineNumber{
            background: #787878;
            text-align: center;
            width: 4vw;
            align-content: center;
            font-size: 2vw;
            font-weight: 700;
            border-radius: 0.5vw;
            height: 100%;
        }
        .lineNumberCont{
            align-content: center;
        }
        .hourInnerCont{
            padding: 0.75vw;
            display: grid;
            gap: 0.5vw;
            background: #222;
        }
        .arrivalCont{
            align-content: center
        }
        .fullArrival{
            display: grid;
            grid-template-columns: 3.85vw 0.15vw 3vw auto;
            gap: 0.5vw;
            background: #292929;
            font-size: 1.4vw;
            padding: 0.25vw 0.5vw;
            border-radius: 0.5vw;
        }
        .smallNumber{
            text-align: center;
            border-radius: 0.5vw;
            font-weight: 700;
        }
        .routeName{
            font-weight: 300;
        }
        .time{
            text-align: center;
            font-family: "Manrope", monospace;
            align-self: center;
            font-weight: 600;
        }
        .separator{
            background: #3b3b3b;
            border-radius: 5vw;
        }
        @media(max-width:700px) {
            #outerContainer{
                gap: 2vw;
                top: 0;
                padding-bottom: 15vw
            }
            #search{
                left: 0;
                top: unset;
                bottom: 0;
                background: #0000;
            }
            #searchBar{
                font-size: 4vw;
                padding: 2vw 4vw;
                backdrop-filter: blur(0.3vw);
                margin: 2vw;
                margin-bottom: 1vw;
                box-shadow: inset 0 0 0.3vw #fff2;
            }
            #searchBar:hover{
                background: #fff2;
                box-shadow: inset 0 0 1vw #fff3;
            }
            .hourOuterCont{
                border-radius: 4vw;
            }
            .hourText{
                font-size: 6vw;
                padding: 0 1vw;
                text-align: center;
                width: calc(100% - 2vw);
                height: 7vw
            }
            .hourContTextBox{
                grid-template-columns: 1fr;
                width: calc(100% - 2vw);
                gap: 0
            }
            .hourInnerCont{
                padding: 1.5vw;
                gap: 1.5vw;
            }
            .counterText{
                text-align: center;
                font-size: 4vw;
                padding-top: -1vw;
            }
            .lineCont{
                grid-template-columns: 11vw 1fr;
                padding: 0;
                border-radius: 2.5vw;
                overflow: hidden;
                gap: 2vw
            }
            .lineNumber{
                width: initial;
                font-size: 6vw;
                padding: 0 1vw;
                border-radius: 2.5vw;
            }
            .arrival{
                font-size: 4vw;
                display: grid;
                grid-template-columns: 11.5vw 1vw auto;
                gap: 1vw;
                background: #333;
                border-radius: 1.5vw;
            }
            .arrivalCont{
                display: grid;
                grid-template-columns: 1fr;
                padding: 1vw 0;
                gap: 1vw;
                padding-right: 1vw;
            }
            .separator{
                margin: 0vw 0;
            }
            .fullArrival{
                border-radius: 2.5vw;
                grid-template-columns: 11.5vw 1vw 7vw auto;
                gap: 1vw;
                padding: 0 1vw;
            }
            .time{
                font-size: 4vw;
            }
            .arrival > .time{
                padding-left: 0.5vw;
            }
            .routeName{
                font-size: 4vw;
            }
            .smallNumber{
                font-size: 4vw;
                align-content: center;
                border-radius: 1vw;
            }
        }
    </style>
</head>
<body>
    <div id="search">
        <button id="dayButton">Select Stop</button>
        <input type="text" onfocusout="showSchedule()" id="searchBar" placeholder="Enter a Bus Stop ID...">
        <button id="dayButton">MONDAY</button>
    </div>
    <div id="outerContainer">
        <!-- <div class="hourOuterCont" style="display: grid">
            <div class="hourContTextBox">
                <span class="hourText">4:00</span>
                <span class="counterText">0 scheduled arrivals</span>
            </div>
            <div class="hourInnerCont" id="hic4">
                <div class="lineCont" id="lc4L10">
                    <div class="lineNumber">10</div>
                    <div class="arrivalCont">
                        <div class="arrival">04:12 | 10 | Γάζι Αεροδρόμιο</div>
                        <div class="arrival">04:12 | 10 | Γάζι Αεροδρόμιο</div>
                        <div class="arrival">04:12 | 10 | Γάζι Αεροδρόμιο</div>
                        <div class="arrival">04:12 | 10 | Γάζι Αεροδρόμιο</div>
                        <div class="arrival">04:12 | 10 | Γάζι Αεροδρόμιο</div>
                    </div>
                </div>
            </div>
        </div> -->
    </div>
    <script>
        const hash = window.location.hash;
        const colorDict = {
            L01: "#c42a19",
            L02: "#7e786f",
            L03: "#8c705d",
            L04: "#570096",
            L05: "#7e0d48",
            L06: "#4b8136",
            L07: "#6483db",
            L09: "#360408",
            L10: "#7e786f",
            L11: "#d82e5c",
            L12: "#5300d9",
            L14: "#7e786f",
            L15: "#487f83",
            L16: "#4c007d",
            L17: "#e89c31",
            L19: "#5300d9",
            L20: "#6fb454",
            L23: "#23211e",
            L21: "#e24172",
            L31: "#4f585c",
            L50: "#000080",
            L91: "#dd6059",
            L92: "#5f6ee5",
            L93: "#65c251"
        }
        const allLineNumbers = ["01","02","03","04","05","06","07","09","10","11","12","14","15","16","17","19","20","21","23","31","50","91","92","93"]
        if (hash) {
            document.getElementById("searchBar").value = hash.split("#")[1]
        } else {
            document.write("No hash found in URL");
        }
        let linesGrouped = true
        async function getKey() {
            const url = "https://corsbypass.orfanidesg15-main.workers.dev/?url=https://irakleio.citybus.gr/stops/live/0122";
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error: ${response.status}`);
            }
            
            return await response.text()
        }

        async function getData(key) {
            const response = await fetch(
                "https://corsbypass.orfanidesg15-main.workers.dev/?url=https://rest.citybus.gr/api/v1/el/110/stops",
                {
                    cache: "no-store",
                    headers: {
                        "Authorization": key,
                        "Cache-Control": "no-cache, no-store, must-revalidate",
                        "Pragma": "no-cache",
                        "Expires": "0"
                    }
                }
            );
            return await response.json();
        }
        async function getMoreData(key, stop, day){
            if (day==3) {
                day = 2
            }
            const response = await fetch(
                `https://corsbypass.orfanidesg15-main.workers.dev/?url=https://rest.citybus.gr/api/v1/el/110/trips/stop/${stop}/day/${day}`,
                {
                    cache: "no-store",
                    headers: {
                        "Authorization": key,
                        "Cache-Control": "no-cache, no-store, must-revalidate",
                        "Pragma": "no-cache",
                        "Expires": "0"
                    }
                }
            );
            return await response.json();
        }
        let list;
        let key;
        getKey().then(html => {
            key = "Bearer " + html.split("token = '")[1].split("';")[0]
            console.log(key)
            key = key
            let outerCont = document.getElementById("outerCont")
            getData(key).then(data => {
                list = data
                showSchedule(Number(new Date().getDay()))
            })
        })
        function showSchedule(date = Number(new Date().getDay())){
            let value = document.getElementById("searchBar").value
            window.location.hash = value
            console.log(value)
            getMoreData(key, value, date).then(data => {
                document.getElementById("outerContainer").innerHTML = ""
                console.table(data)
                for (i=0;i<=23;i++){
                    let hourOuterCont = document.createElement("div")
                    hourOuterCont.id = "hc"+((i+2)%24)
                    hourOuterCont.className = "hourOuterCont"

                    let hourContTextBox = document.createElement("div")
                    hourContTextBox.className = "hourContTextBox"

                    let hour = document.createElement("span");
                    hour.innerHTML = ((i+2)%24)+":00"
                    hour.className = "hourText"

                    let counter = document.createElement("span");
                    counter.innerHTML = "0"
                    counter.className = "counterText"
                    counter.id = "c"+(i+2)%24

                    let hourInnerCont = document.createElement("div");
                    hourInnerCont.id = "hic"+(i+2)%24
                    hourInnerCont.className = "hourInnerCont"

                    hourContTextBox.appendChild(hour)
                    hourContTextBox.appendChild(counter)
                    hourOuterCont.appendChild(hourContTextBox)
                    hourOuterCont.appendChild(hourInnerCont)
                    document.getElementById("outerContainer").appendChild(hourOuterCont)
                    // Line groups
                    if (linesGrouped) {
                        allLineNumbers.forEach(line => {
                            let lineCont = document.createElement("div")
                            lineCont.className = "lineCont"
                            lineCont.id = "lc"+((i+2)%24)+"L"+line
    
                            let lineNumber = document.createElement("div")
                            lineNumber.className = "lineNumber"
                            lineNumber.innerHTML = line
                            lineNumber.style.background = colorDict["L"+line]
                            
                            let arrivalCont = document.createElement("div")
                            arrivalCont.className = "arrivalCont"
                            
                            lineCont.appendChild(lineNumber)
                            lineCont.appendChild(arrivalCont)
                            hourInnerCont.appendChild(lineCont)
                        });
                    }
                }
                data.forEach(element => {
                    console.log(element)
                    // DAYS 0-6 | Starts on Sunday (0)
                    // ROUTE API RESPONSE
                    // day: 3
                    // id: 51122767
                    // lineCode: "12"
                    // lineColor: "#787878"
                    // lineName: "HELLENIC MEDITERRANEAN UNIVERSITY ( EL.ME.PA.)"
                    // lineTextColor: "#ffffff"
                    // routeCode: "21018"
                    // routeName: "AIRPORT - HMU | HELLENIC MEDITERRANEAN UNIVERSITY"
                    // stopCode: "0122"
                    // stopName: "62 MARTYRON 200 - JUMBO"
                    // tripTime: "12:57"
                    // tripTimeHour: 12
                    // tripTimeMinute: 57
                

                    if (linesGrouped){
                        let cont = document.createElement("div")
                        cont.className = "arrival"

                        let time = document.createElement("span")
                        time.innerHTML = element.tripTime
                        time.className = "time"
                        let separator = document.createElement("div")
                        separator.className = "separator"
                        let name = document.createElement("span")
                        name.innerHTML = element.routeName

                        cont.append(time)
                        cont.append(separator)
                        cont.append(name)

                        let hc = document.getElementById("hc"+element.tripTimeHour)
                        hc.style.display = "grid"
                        let lc = document.getElementById("lc"+element.tripTimeHour+"L"+element.lineCode)
                        lc.style.display = "grid"
                        lc.childNodes[1].appendChild(cont)
                        let counter = document.getElementById("c"+element.tripTimeHour)
                        counter.innerHTML = Number(counter.innerHTML.split(" ")[0])+1+((Number(counter.innerHTML.split(" ")[0])+1==1)?" scheduled arrival":" scheduled arrivals")
                    }else{
                        let cont = document.createElement("div")
                        cont.className = "fullArrival"
                        
                        let time = document.createElement("span")
                        time.className = "time"
                        time.innerHTML = element.tripTime
                        
                        let separator = document.createElement("div")
                        separator.className = "separator"

                        let number = document.createElement("div")
                        number.className = "smallNumber"
                        number.innerHTML = element.lineCode
                        number.style.background = colorDict["L"+element.lineCode]
                        
                        let name = document.createElement("span")
                        name.className = "routeName"
                        name.innerHTML = element.routeName

                        let hc = document.getElementById("hc"+element.tripTimeHour)
                        cont.appendChild(time)
                        cont.appendChild(separator)
                        cont.appendChild(number)
                        cont.appendChild(name)
                        hc.childNodes[1].appendChild(cont)
                        hc.style.display = "grid"
                        let counter = document.getElementById("c"+element.tripTimeHour)
                        counter.innerHTML = Number(counter.innerHTML.split(" ")[0])+1+((Number(counter.innerHTML.split(" ")[0])+1==1)?" scheduled arrival":" scheduled arrivals")
                    }
                });
                for (i=0;i<=23;i++) {
                    let hc = document.getElementById("hc"+i)
                    if (hc.style.display != "grid") {
                        hc.innerHTML=""
                        hc.remove()
                    }else{
                        if (linesGrouped) {
                            allLineNumbers.forEach(line => {
                                let lc = document.getElementById("lc"+i+"L"+line)
                                if (lc.style.display != 'grid') {
                                    lc.remove()
                                }
                            });
                        }
                    }
                }
            })
        }
        document.getElementById("searchBar")
            .addEventListener("keyup", function(event) {
            event.preventDefault();
            if (event.keyCode === 13) {
                document.getElementById("searchBar").blur();
            }
        });
        //https://rest.citybus.gr/api/v1/en/110/trips/stop/2196/day/5
    </script>
</body>
</html>
