<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TETR.IO Fetch Test</title>
</head>
<body>
    <script>
        async function fetchData(user) {
            try {
                const response = await fetch(
                    `https://corsproxy.io/?https://ch.tetr.io/api/users/${user}/summaries/league`
                );

                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }

                const data = await response.json();
                return data
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }
        list = [
            "wumbo",
            "georgeorfa015",
            "4sythi",
            "cenvkk",
            "0713_ahsc",
        ]
        list.forEach(element => {
            fetchData(element).then(data => {
                console.table(data.data.rank)
                let img = document.createElement("img")
                img.src = "https://tetr.io/res/league-ranks/"+data.data.rank+".png"
                document.body.appendChild(img)
            })
        });
    </script>
</body>
</html>
